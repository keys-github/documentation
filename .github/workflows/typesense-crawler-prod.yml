name: Typesense crawler for prod

on:
    push:
        branches:
            - testmuCom

jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # environment: prod
    env:
      INDEX_NAME: testmuai
      START_URL: https://www.testmuai.com/support/
      SITEMAP_URL: https://www.testmuai.com/support/sitemap.xml
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3   # You MUST checkout your repository first!

      - name: Prepare config
        run: envsubst < config.json > config.processed.json

      - name: Run DocSearch Scraper
        uses: celsiusnarhwal/typesense-scraper@v2
        with:
          api-key: ${{ secrets.TYPESENSE_API_KEY }}
          host: ${{ secrets.TYPESENSE_HOST }}
          port: 443
          protocol: https
          config: config.processed.json

          # run: |
          #     cat config.json
          #     docker run -it --env-file=.env -e "CONFIG=$(cat config.json | jq -r tostring)" typesense/docsearch-scraper:0.9.1